name: QA Tech Trend Bot (점심시간 배송)

on:
  schedule:
    # UTC 기준 03:00 분 = 한국 시간(KST) 낮 12:00 분
    - cron: '0 3 * * *'
  workflow_dispatch: # 직접 버튼을 눌러 테스트할 수 있게 해주는 마법의 옵션

# 👇 이 두 줄을 추가하면 Node.js 경고 메시지가 깔끔하게 사라집니다!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-bot:
    runs-on: ubuntu-latest # GitHub이 무료로 제공하는 일꾼 컴퓨터

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 설치 속도를 높여주는 캐시 기능

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 트렌드 봇 실행 (디스코드 전송)
      env:
        # GitHub Secrets에서 안전하게 꺼내옵니다.
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: python main.py
