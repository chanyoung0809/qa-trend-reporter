name: QA Tech Trend Bot (점심시간 배송)

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

# 노란색 경고창(Node.js 20 deprecation)을 없애주는 마법의 코드
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        # requirements.txt는 최상단에 있으니 그대로 둡니다.
        pip install -r requirements.txt

    - name: 트렌드 봇 실행 (디스코드 전송)
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      # 👇 바로 이 부분! src 폴더 안의 main.py를 실행하라고 알려줍니다.
      run: python src/main.py
